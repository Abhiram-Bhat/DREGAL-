<!DOCTYPE html>
<html>
<head>
    <title>Simple Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Shop @ Online Store</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Cart</a>
        <a href="#">Checkout</a>
    </nav>
</header>

<main>

<section>
    <h2>Products</h2>

    <div class="products">
        <div class="product">
            <img src="images/tshirt.jpg">
            <h3>T-Shirt</h3>
            <p>₹799</p>
            <button onclick="addToCart('T-Shirt', 799)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="images/book.jpg">
            <h3>Book</h3>
            <p>₹299</p>
            <button onclick="addToCart('Book', 299)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="images/laptop.jpg">
            <h3>Laptop</h3>
            <p>₹55000</p>
            <button onclick="addToCart('Laptop', 55000)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="images/phone.jpg">
            <h3>Phone</h3>
            <p>₹25000</p>
            <button onclick="addToCart('Phone', 25000)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="images/keyboard.jpg">
            <h3>Keyboard</h3>
            <p>₹1499</p>
            <button onclick="addToCart('Keyboard', 1499)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="images/mouse.jpg">
            <h3>Mouse</h3>
            <p>₹599</p>
            <button onclick="addToCart('Mouse', 599)">Add to Cart</button>
        </div>
    </div>
</section>

<section>
    <h2>Cart</h2>
    <ul id="cartList"></ul>
    <h3 id="total"></h3>
</section>

<section>
    <h2>Checkout</h2>
    <button onclick="checkout()">Place Order</button>
</section>

</main>

<footer>
    <p>© 2026 Simple Shop</p>
</footer>

<script src="script.js"></script>

</body>
</html>
